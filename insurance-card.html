<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1a6b2f;--gold:#2e7d32;--dark:#f3fbf4;}
body{font-family:'Poppins','Tiro Tamil','Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;background:#f3fbf4;color:#fff;min-height:100vh;font-variant-emoji:emoji;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.topbar{background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(46,125,50,0.2);
  padding:0.9rem 1.2rem;display:flex;align-items:center;gap:0.8rem;position:sticky;top:0;z-index:50;}
.back-btn{background:rgba(46,125,50,0.15);border:1px solid rgba(46,125,50,0.3);color:var(--gold);
  padding:0.4rem 0.8rem;border-radius:8px;font-size:0.9rem;text-decoration:none;}
.topbar h1{color:var(--gold);font-family:'Tiro Tamil',serif;font-size:1.05rem;}
.content{padding:1rem 1.2rem;padding-bottom:3rem;}

/* Top nav for application modules */
.module-nav{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:0.6rem;
  margin:0.8rem 1.2rem 0.6rem;
}
.module-tab{
  border:1px solid rgba(255,255,255,0.45);
  background:rgba(255,255,255,0.12);
  color:#ffffff;
  border-radius:10px;
  padding:0.55rem 0.4rem;
  font-size:0.78rem;
  font-family:'Tiro Tamil',serif;
  font-weight:700;
  cursor:pointer;
}
.module-tab.active{
  background:#ffffff;
  color:#0f4d2b;
}

.status-strip{
  margin:0.2rem 1.2rem 0.8rem;
  background:#ffffff;
  border:1px solid #b7d8bd;
  border-radius:10px;
  padding:0.6rem 0.8rem;
  color:#123d26;
  font-size:0.8rem;
  display:flex;
  justify-content:space-between;
  gap:0.5rem;
}
.module-section{display:none;}
.module-section.active{display:block;}
/* Schemes section background */
#schemesSection{
  background:#ffffff;
  border:1px solid #b7d8bd;
  border-radius:14px;
  padding:0.9rem;
}

/* Generic record cards for scheme/report */

  background:#ffffff;
  border:1px solid #b7d8bd;
  border-radius:14px;
  padding:0.9rem;
  margin-bottom:0.8rem;
}
.record-head{
  display:flex;
  justify-content:space-between;
  gap:0.6rem;
  align-items:flex-start;
}
.record-head h4{
  color:#0f4d2b;
  font-size:0.9rem;
  font-family:'Tiro Tamil',serif;
}
.record-meta{
  margin-top:0.35rem;
  color:#285436;
  font-size:0.76rem;
  line-height:1.5;
}
.record-actions{
  margin-top:0.7rem;
  display:flex;
  gap:0.5rem;
}
.record-actions .dl-btn{
  font-size:0.78rem;
  padding:0.55rem 0.8rem;
  min-height:auto;
}

/* Insurance Card */
.ins-card{
  background:#ffffff;
  border:1px solid #b7d8bd;
  border-radius:20px;
  padding:1.3rem;
  margin-bottom:1.2rem;
  position:relative;
  overflow:hidden;
}
.ins-card::before{
  content:'🌾';position:absolute;right:-10px;top:-10px;font-size:5rem;opacity:0.07;
}
.ins-card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:4px;

}
.card-header{display:flex;align-items:center;gap:0.8rem;margin-bottom:1rem;}
.card-logo{width:44px;height:44px;border-radius:50%;background:#eaf6ec;

.card-title h3{color:var(--gold);font-size:0.9rem;font-family:'Tiro Tamil',serif;}
.card-title p{color:#2f6d3a;font-size:0.7rem;}
.card-id{margin-left:auto;background:rgba(46,125,50,0.15);color:var(--gold);

<body>

<script>
let currentApp = null;
let appsCache = [];
let schemeAppsCache = [];
let reportAppsCache = [];
const SMS_API_BASE = 'http://localhost:8787';

function escapeHTML(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function getLandValue(app) {
  return app.land || app.totalland || '--';
}

function hasMeaningfulValue(value) {
  return value !== null && value !== undefined && String(value).trim() !== '' && String(value).trim() !== '--';
}

function getPattaValue(app) {
  if(app.patta) return app.patta;
  const pattas = (app.crops || []).map(c => c.patta).filter(Boolean);
  return pattas.join(', ') || '--';
}

function getDistrictPdfLabel(value) {
  const key = String(value || '').trim();
  const map = {
    'செங்கல்பட்டு': 'Chengalpattu',
    'சென்னை': 'Chennai',
    'காஞ்சிபுரம்': 'Kanchipuram',
    'திருவள்ளூர்': 'Tiruvallur',
    'வேலூர்': 'Vellore',
    'திருப்பத்தூர்': 'Tirupathur',
    'ராணிப்பேட்டை': 'Ranipet',
    'தர்மபுரி': 'Dharmapuri',
    'கிருஷ்ணகிரி': 'Krishnagiri',

function mapAuthorityStatus(code, fallback) {
  if (code === 'pending') return '⏳ அதிகாரி சரிபார்ப்பு';
  if (code === 'verified_authority') return '✅ அதிகாரி உறுதி';
  if (code === 'sent_to_government') return '📤 அரசுக்கு அனுப்பப்பட்டது';
  if (code === 'rejected') return '❌ நிராகரிக்கப்பட்டது';
  return fallback || '⏳ சமர்ப்பிக்கப்பட்டது';
}

function statusClassByAuthority(code) {
  if (code === 'verified_authority') return 'status-verified';
  if (code === 'sent_to_government') return 'status-forwarded';
  if (code === 'rejected') return 'status-rejected';
  return 'status-pending';
}

function loadReportCards() {
  reportAppsCache = JSON.parse(localStorage.getItem(getFarmerScopedKey('farmerReports')) || '[]');
  // Demo mode fallback: compute report status locally (VIEWED -> RESOLVED)
  let reportChanged = false;
  reportAppsCache = reportAppsCache.map(r => {
    if (!r) return r;
    if (r.reportMockAt || r.reportMock === true) {
      const base = Number(r.reportMockAt || Date.now());
      const age = Date.now() - base;
      const next = age >= 13000 ? 'resolved' : age >= 7000 ? 'viewed' : 'pending';
      if (next !== r.status) reportChanged = true;
      return { ...r, status: next };
    }
    return r;
  });
  if (reportChanged) {
    localStorage.setItem(getFarmerScopedKey('farmerReports'), JSON.stringify(reportAppsCache));

  const container = document.getElementById('reportsList');
  if (reportAppsCache.length === 0) {

async function generatePDF() {
  if(!currentApp) return;
  if(!window.jspdf || !window.jspdf.jsPDF) {
    alert('PDF உருவாக்க முடியவில்லை. மீண்டும் முயற்சிக்கவும்.');
    return;
  }
  const app = currentApp;
  const crops = Array.isArray(app.crops) ? app.crops : [];
  const landValue = getLandValue(app);
  const pattaValue = getPattaValue(app);
  const districtValue = getDistrictPdfLabel(app.district);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const pageW = 210;
  const pageH = 297;
  const margin = 8;
  const innerW = pageW - (margin * 2);
  let y = 12;

  const rect = (x, yy, w, h, fill = null, draw = [26,107,47], width = 0.4) => {
    doc.setDrawColor(...draw);
    doc.setLineWidth(width);
    if (fill) {
      doc.setFillColor(...fill);
      doc.rect(x, yy, w, h, 'FD');
    } else {
      doc.rect(x, yy, w, h);
    }
  };
  const line = (x1, y1, x2, y2, color = [26,107,47], width = 0.4) => {
    doc.setDrawColor(...color);
    doc.setLineWidth(width);
    doc.line(x1, y1, x2, y2);
  };
  const text = (value, x, yy, opts = {}) => {
    const { size = 10, color = [23,53,36], align = 'left', style = 'normal', maxWidth = null } = opts;
    doc.setFont('helvetica', style);
    doc.setFontSize(size);
    doc.setTextColor(...color);
    const out = maxWidth ? doc.splitTextToSize(String(value || '--'), maxWidth) : String(value || '--');
    doc.text(out, x, yy, { align });
  };
  const ensurePage = (needed = 10) => {
    if (y + needed <= pageH - 12) return;
    doc.addPage();
    rect(margin, margin, innerW, pageH - (margin * 2), null, [26,107,47], 0.8);
    y = 14;
  };
  const labelValueRow = (label, value, shaded = false) => {
    const rowH = 10;
    ensurePage(rowH + 2);
    rect(14, y, 58, rowH, shaded ? [245,245,245] : null, [221,221,221], 0.2);
    rect(72, y, 124, rowH, null, [221,221,221], 0.2);
    text(label, 17, y + 6.5, { size: 9.5, color: [79,111,88] });
    text(value, 75, y + 6.5, { size: 9.5, style: 'bold', maxWidth: 118 });
    y += rowH;
  };
  const cropRow = (cells, shaded = false) => {
    const heights = cells.map((cell, i) => doc.splitTextToSize(String(cell), [10, 50, 18, 48, 36][i]).length);
    const rowH = Math.max(...heights) * 4.6 + 3;
    ensurePage(rowH + 2);
    const cols = [14, 26, 76, 94, 142];
    const widths = [12, 50, 18, 48, 54];
    cols.forEach((x, i) => rect(x, y, widths[i], rowH, shaded ? [250,252,250] : null, [221,221,221], 0.2));
    text(cells[0], 20, y + 5.5, { size: 8.5, align: 'center' });
    text(cells[1], 28, y + 5.5, { size: 8.5, maxWidth: 46 });
    text(cells[2], 85, y + 5.5, { size: 8.5, align: 'center' });
    text(cells[3], 96, y + 5.5, { size: 8.5, maxWidth: 44 });
    text(cells[4], 193, y + 5.5, { size: 8.5, align: 'right' });
    y += rowH;
  };

  rect(margin, margin, innerW, pageH - (margin * 2), null, [26,107,47], 0.8);

async function downloadSchemePDF(refNo) {
  const app = schemeAppsCache.find(a => a.refNo === refNo);
  if (!app) return;
  const applicantName = getSchemeApplicantName(app);
  const applicantMobile = getSchemeApplicantMobile(app);
  const applicantDistrict = getSchemeApplicantDistrict(app);
  const authorityStatus = mapAuthorityStatus(app.authorityStatusCode || 'pending', app.authorityStatus);

  const wrapText = (ctx, text, x, y, maxWidth, lineHeight) => {
    const words = String(text || '').split(/\s+/);
    let line = '';
    let cy = y;
    for (let n = 0; n < words.length; n++) {
      const testLine = line ? `${line} ${words[n]}` : words[n];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && line) {
        ctx.fillText(line, x, cy);
        line = words[n];
        cy += lineHeight;
      } else {
        line = testLine;
      }
    }
    if (line) ctx.fillText(line, x, cy);
    return cy;
  };

  try {
    if (document.fonts && document.fonts.ready) {
      await Promise.race([
        document.fonts.ready,
        new Promise(resolve => setTimeout(resolve, 1500))
      ]);
    }
  } catch (_) {}

  const scale = 2;
  const canvas = document.createElement('canvas');
  canvas.width = 595 * scale;
  canvas.height = 842 * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, 595, 842);

  // Header
  ctx.fillStyle = '#0f4d2b';
  ctx.fillRect(0, 0, 595, 110);
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 22px Poppins, "Tiro Tamil", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Tamil Nadu Scheme Application', 297.5, 50);
  ctx.font = '600 14px "Tiro Tamil", Poppins, sans-serif';
  ctx.fillText('தமிழ்நாடு அரசு - விண்ணப்ப ரசீது', 297.5, 78);

  // Body
  ctx.textAlign = 'left';
  ctx.fillStyle = '#123d26';
  ctx.font = '600 14px Poppins, "Tiro Tamil", sans-serif';

  let y = 170;
  const left = 50;
  const label = (k, v) => {
    ctx.fillStyle = '#1f5f2a';
    ctx.fillText(k, left, y);
    ctx.fillStyle = '#123d26';
    wrapText(ctx, String(v ?? '--'), left + 160, y, 595 - (left + 160) - 50, 20);
    y += 34;
  };

  label('Reference No:', app.refNo || '--');
  label('Scheme:', app.schemeName || '--');
  label('Applicant:', applicantName);
  label('Mobile:', applicantMobile);
  label('District:', applicantDistrict);
  label('Category:', app.applicantCategory || '--');
  label('Date:', new Date(app.timestamp || Date.now()).toLocaleDateString('ta-IN'));

  y += 10;
  ctx.fillStyle = '#1f5f2a';
  ctx.fillText('Status:', left, y);
  ctx.fillStyle = '#123d26';
  wrapText(ctx, authorityStatus, left + 160, y, 595 - (left + 160) - 50, 20);

  // Footer
  ctx.fillStyle = '#6b9a78';
  ctx.font = '12px Poppins, "Tiro Tamil", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('விவசாயி இணையம் மூலம் உருவாக்கப்பட்டது', 297.5, 820);

  const img = canvas.toDataURL('image/png', 1.0);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  doc.addImage(img, 'PNG', 0, 0, 210, 297);
  doc.save(`scheme_${app.refNo || Date.now()}.pdf`);
}

async function refreshSchemeAuthorityStatuses() {
  if (!schemeAppsCache.length) return;
  let changed = false;
  const updated = await Promise.all(schemeAppsCache.map(async (app) => {
    if (!app.refNo) return app;
    // Demo mode fallback: compute status locally (no real SMS / no server needed)
    if (app.authorityMockAt || app.authorityMock === true) {
      const submittedAt = Number(app.authorityMockAt || app.timestamp || Date.now());
      const age = Date.now() - submittedAt;
      let code = 'pending';
      if (age >= 13000) code = 'sent_to_government';
      else if (age >= 7000) code = 'verified_authority';
      const label = mapAuthorityStatus(code, app.authorityStatus);
      if (code !== app.authorityStatusCode || label !== app.authorityStatus) {
        changed = true;
      }
      return {
        ...app,
        authorityStatusCode: code,
        authorityStatus: label,
        authorityMessage: app.authorityMessage || 'Status auto-updated'
      };
    }
    try {
      const res = await fetch(`${SMS_API_BASE}/api/sms/status?ref=${encodeURIComponent(app.refNo)}`);
      const data = await res.json();
      if (!res.ok || !data.ok) return app;
      const code = data.status || app.authorityStatusCode || 'pending';
      const label = mapAuthorityStatus(code, app.authorityStatus);
      if (code !== app.authorityStatusCode || label !== app.authorityStatus) {
        changed = true;
      }
      return {
        ...app,
        authorityStatusCode: code,
        authorityStatus: label,
        authorityMessage: data.authorityMessage || app.authorityMessage || ''
      };
    } catch (_) {
      return app;
    }
  }));

  if (changed) {
    schemeAppsCache = updated;
    localStorage.setItem(getFarmerScopedKey('schemeApplications'), JSON.stringify(schemeAppsCache));
    const container = document.getElementById('schemesList');
    if (container) loadSchemeCards(true);
  }
}
