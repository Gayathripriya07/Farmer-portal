<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>சந்தை விலை</title>
<link href="https://fonts.googleapis.com/css2?family=Tiro+Tamil:ital@0;1&family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#1a6b2f;--gold:#2e7d32;--dark:#f3fbf4;}
body{font-family:'Poppins',sans-serif;background:#f3fbf4;color:#fff;min-height:100vh;overflow-x:hidden;overflow-y:auto;-webkit-overflow-scrolling:touch;}

.topbar{
  background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(46,125,50,0.2);
  padding:0.9rem 1.2rem;display:flex;align-items:center;gap:0.8rem;
  position:sticky;top:0;z-index:50;
}
.back-btn{background:rgba(46,125,50,0.15);border:1px solid rgba(46,125,50,0.3);
  color:var(--gold);padding:0.4rem 0.8rem;border-radius:8px;cursor:pointer;font-size:0.9rem;text-decoration:none;}
.topbar h1{color:var(--gold);font-family:'Tiro Tamil',serif;font-size:1.1rem;}
.live-badge{margin-left:auto;background:#dc2626;color:#fff;font-size:0.65rem;font-weight:700;
  padding:3px 8px;border-radius:50px;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}

.content{padding:1rem 1.2rem;}

/* Filters */
.filter-card{
  background:rgba(255,255,255,0.05);border:1px solid rgba(46,125,50,0.2);
  border-radius:16px;padding:1.2rem;margin-bottom:1rem;
}
.filter-row{display:flex;gap:0.8rem;margin-bottom:0.8rem;}
.filter-row:last-child{margin-bottom:0;}
.filter-group{flex:1;}
.filter-group label{display:block;color:#2f6d3a;font-size:0.75rem;margin-bottom:0.4rem;font-family:'Tiro Tamil',serif;}
.filter-group select,.filter-group input{
  width:100%;padding:0.65rem 0.8rem;
  background:rgba(255,255,255,0.07);border:1px solid rgba(46,125,50,0.25);
  border-radius:10px;color:#fff;font-size:0.85rem;outline:none;
}
.filter-group select option{
  background:#ffffff;
  color:#123d26;
}
.search-btn{
  width:100%;padding:0.75rem;background:linear-gradient(135deg,#2e7d32,#66bb6a);
  border:none;border-radius:10px;color:#f3fbf4;font-weight:700;font-size:0.9rem;
  cursor:pointer;font-family:'Tiro Tamil',serif;
}

/* Price cards */
.section-label{color:var(--gold);font-size:0.9rem;font-family:'Tiro Tamil',serif;
  font-weight:700;margin-bottom:0.8rem;display:flex;align-items:center;gap:0.5rem;}
.price-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:1.2rem;}
.price-card{
  background:rgba(255,255,255,0.05);border:1px solid rgba(46,125,50,0.15);
  border-radius:14px;padding:1rem;
}
.price-card .crop-name{font-size:0.85rem;color:#3f7d4a;font-family:'Tiro Tamil',serif;font-weight:600;}
.price-card .crop-en{font-size:0.7rem;color:#6b9a78;}
.price-card .price-val{font-size:1.4rem;font-weight:700;color:var(--gold);margin:0.4rem 0 0.2rem;}
.price-card .price-unit{font-size:0.65rem;color:#2f6d3a;}
.price-card .price-change{font-size:0.72rem;margin-top:0.3rem;}
.up{color:#22c55e;}.down{color:#ef4444;}
.price-card .mandi{font-size:0.65rem;color:#6b9a78;margin-top:0.2rem;}

/* Trader section */
.trader-card{
  background:rgba(255,255,255,0.04);border:1px solid rgba(46,125,50,0.15);
  border-radius:14px;padding:1rem;margin-bottom:0.8rem;
  display:flex;align-items:center;gap:1rem;
}
.trader-avatar{
  width:52px;height:52px;border-radius:50%;background:rgba(46,125,50,0.2);
  border:2px solid rgba(46,125,50,0.4);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;flex-shrink:0;
}
.trader-info{flex:1;}
.trader-info h4{color:#ffffff;font-size:0.9rem;font-weight:600;}
.trader-info p{color:#2f6d3a;font-size:0.75rem;margin-top:0.2rem;}
.trader-info .crops-tag{
  display:flex;flex-wrap:wrap;gap:0.3rem;margin-top:0.4rem;
}
.crops-tag span{background:rgba(46,125,50,0.15);color:var(--gold);font-size:0.65rem;padding:2px 7px;border-radius:50px;}
.call-btn{
  background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);
  color:#22c55e;padding:0.5rem 0.8rem;border-radius:8px;font-size:0.75rem;font-weight:600;cursor:pointer;
  text-decoration:none;display:block;text-align:center;flex-shrink:0;
}

.loading{text-align:center;padding:2rem;color:#2f6d3a;font-family:'Tiro Tamil',serif;}
.spinner{font-size:2rem;animation:spin 1s linear infinite;display:block;margin:0 auto 0.5rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Market info */
.api-status{
  background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);
  border-radius:10px;padding:0.6rem 1rem;margin-bottom:1rem;
  font-size:0.75rem;color:#0f4d2b;display:flex;align-items:center;gap:0.5rem;
}

.price-val.touchable{
  cursor:pointer;
  text-decoration:underline;
  text-underline-offset:3px;
}

/* Green-White Theme Override */
:root {
  --theme-bg: #f4fbf5;
  --theme-surface: #ffffff;
  --theme-primary: #2e7d32;
  --theme-primary-soft: #66bb6a;

.reg-card, .profile-popup, .sms-card, .modal-inner, .modal-sheet, .report-item, .result-card, .trader-card,
.soil-card, .price-card, .filter-card, .card-wrap, .card {

h1, h2, h3, h4, h5, h6, p, label, .label, .dept, .icon-label, .vinfo p, .vinfo h3, .video-info p, .video-info h3 {
  color: var(--theme-text) !important;

input, select, textarea, .form-control {

}

.btn-primary, .apply-btn, .btn-next, .submit-btn, .pay-btn, .done-btn, .calc-btn, .add-crop-btn, .dl-btn, .btn-green {
  background: linear-gradient(135deg, var(--theme-primary), var(--theme-primary-soft)) !important;

.bnav-item span:last-child, .step-lbl, .form-group label, .back-btn {

/* Contrast Fix + Polished Theme */
:root {
  --ui-bg: #f4fbf5;
  --ui-surface: #ffffff;
  --ui-green: #2e7d32;
  --ui-green-dark: #1f5f2a;
  --ui-green-soft: #66bb6a;

}

body {
  background: linear-gradient(180deg, #f4fbf5 0%, #ecf8ee 100%) !important;
  color: var(--ui-text) !important;
}

/* Green backgrounds -> White text */
#splash, #register, .hero, .page-header, .topbar, .govt-header, .header,
.profile-popup, .insurance-card, .chat-header {
  background: linear-gradient(135deg, var(--ui-green-dark), var(--ui-green)) !important;
  color: #ffffff !important;
}
#splash *, #register *, .hero *, .page-header *, .topbar *, .govt-header *, .header *,
.profile-popup *, .insurance-card *, .chat-header * {
  color: #ffffff !important;
}

/* White backgrounds -> Green text */
.reg-card, .form-card, .video-card, .scheme-card, .stat-card, .icon-card, .report-item,
.result-card, .trader-card, .soil-card, .price-card, .filter-card, .modal-inner, .modal-sheet,
.sms-card, .card-wrap, .card, .content, .summary-box, .govt-box, .premium-box,
.nav-tabs, .steps, .bottom-nav, .photo-box {

  color: var(--ui-text) !important;
  border-color: var(--ui-border) !important;

}
.reg-card *, .form-card *, .video-card *, .scheme-card *, .stat-card *, .icon-card *, .report-item *,
.result-card *, .trader-card *, .soil-card *, .price-card *, .filter-card *, .modal-inner *, .modal-sheet *,
.sms-card *, .card-wrap *, .card *, .content *, .summary-box *, .govt-box *, .premium-box *,
.nav-tabs *, .steps *, .bottom-nav *, .photo-box * {
  color: var(--ui-text) !important;
}

/* Inputs */
input, select, textarea, .form-control, .search-box {
  background: #ffffff !important;
  color: var(--ui-text) !important;
  border: 1px solid var(--ui-border) !important;
}
input::placeholder, textarea::placeholder, .search-box::placeholder {
  color: #5f7f66 !important;
}

/* Buttons */
.btn-primary, .apply-btn, .btn-next, .submit-btn, .pay-btn, .done-btn, .calc-btn, .add-crop-btn,
.dl-btn, .btn-green, .icon-badge, .lang-btn.active {
  background: linear-gradient(135deg, var(--ui-green), var(--ui-green-soft)) !important;
  color: #ffffff !important;
  border: none !important;
}
.back-btn, .btn-back, .btn-outline, .btn-edit, .nav-tab {
  background: #ffffff !important;
  color: var(--ui-green) !important;
  border: 1px solid var(--ui-border) !important;
}

/* Readability Scale Boost */
html { font-size: 17px !important; }
body { line-height: 1.7 !important; }

h1 { font-size: 1.35rem !important; }
h2 { font-size: 1.2rem !important; }
h3 { font-size: 1.08rem !important; }
p, label, input, select, textarea, button, a, span {

}

button, .btn, .btn-primary, .btn-next, .btn-back, .submit-btn, .apply-btn, .pay-btn, .done-btn,
.back-btn, .nav-tab, .bnav-item, .icon-card {

}

input, select, textarea, .form-control, .search-box {
  min-height: 46px;
  padding-top: 0.7rem !important;
  padding-bottom: 0.7rem !important;
}

.scheme-card, .form-card, .video-card, .report-item, .price-card, .soil-card, .trader-card {
  padding: 1rem !important;
}

/* Header Footer Dark Green Theme */
:root {
  --hf-green: #0f4d2b;

}

body {

.header, .topbar, .govt-header, .page-header, .bottom-nav, footer {

.bnav-item.active span:last-child,

.reg-card, .form-card, .video-card, .scheme-card, .stat-card, .icon-card, .report-item,

.sms-card, .card-wrap, .card, .content {
  background: #ffffff !important;
  color: var(--body-text-green) !important;
}

h1, h2, h3, h4, h5, h6, p, label, span, a, li, td, th {

}

input, select, textarea, .form-control, .search-box {
  background: #ffffff !important;
  color: var(--body-text-green) !important;
  border-color: #b7d8bd !important;
}

/* Text Visibility Fix */
body,
.content,
.section,
.form-content,
.schemes-container,
.stats-grid,
.reg-card,
.form-card,
.video-card,
.scheme-card,
.stat-card,
.icon-card,
.report-item,
.result-card,

.soil-card,
.price-card,
.filter-card,
.modal-inner,
.modal-sheet,
.sms-card,
.sms-box,
.application-page,
.application-page * {
  color: #123d26 !important;
}

.header *,
.topbar *,
.govt-header *,
.page-header *,
.bottom-nav *,
footer * {
  color: #ffffff !important;
}

/* Back button visibility fix */
.topbar .back-btn {
  background: rgba(255,255,255,0.16) !important;
  color: #ffffff !important;
  border: 1px solid rgba(255,255,255,0.75) !important;
}
.topbar .back-btn * {
  color: #ffffff !important;
}

/* No Bottom Icons + Emergency Footer */
.bottom-nav,
.bnav-item,
.nav-item,
#bottomNav {

}

body {
  padding-bottom: 86px !important;
}

.emergency-footer {

<script>
function getCurrentFarmerProfile() {
  const phone = (localStorage.getItem('currentFarmerPhone') || '').replace(/\D/g, '');
  const farmers = JSON.parse(localStorage.getItem('farmersByPhone') || '{}');
  if (phone && farmers[phone]) return farmers[phone];
  return {};
}

const profile = getCurrentFarmerProfile();
if (!profile.phone) {
  window.location.href = 'index.html';
}

const apiStatusEl = document.getElementById('apiStatus');
const liveBadgeEl = document.getElementById('liveBadge');
apiStatusEl.textContent = '✅ தமிழ்நாடு முழு மாவட்டங்களின் சந்தைத் தகவல்';
liveBadgeEl.textContent = '🔴 நேரலை';

  {crop:'கம்பு',min:1520,max:1840,modal:1680,change:'+1.1',up:true,mandi:'விழுப்புரம்'},

async function fetchPrices() {
  document.getElementById('loading').style.display='block';
  document.getElementById('priceGrid').innerHTML='';

  const crop = document.getElementById('cropSelect').value;
  setTimeout(() => {
    document.getElementById('loading').style.display='none';
    const filtered = crop ? marketData.filter(d => d.crop === crop) : marketData;
    renderMarketData(filtered);
    renderTraders(crop || '');
  }, 500);
}

function renderMarketData(data) {
  const grid = document.getElementById('priceGrid');
  grid.innerHTML = data.map(d => `
    <div class="price-card">
      <div class="crop-name">${d.crop}</div>
      <div class="crop-en">மாவட்டம்: ${d.mandi}</div>
      <div class="price-val touchable" onclick="renderTraders('${d.crop}')">₹${d.modal}</div>
      <div class="price-unit">குவிண்டால் (100 கிலோ) | குறைந்தபட்சம்: ₹${d.min} | அதிகபட்சம்: ₹${d.max}</div>
      <div class="price-change ${d.up ? 'up' : 'down'}">${d.up ? '▲' : '▼'} ${d.change}% இன்று</div>
      <div class="mandi">📍 ${d.mandi} சந்தை | தொகையைத் தொடு → வியாபாரி தொடர்பு</div>
    </div>`).join('');
}

function renderTraders(cropName) {
  const list = document.getElementById('tradersList');
  const filtered = cropName ? traders.filter(t => t.crops.includes(cropName)) : traders;
  const finalList = filtered.length ? filtered : traders;

  list.innerHTML = finalList.map(t => `
    <div class="trader-card">
      <div class="trader-avatar">🤝</div>
      <div class="trader-info">
        <h4>${t.name}</h4>
        <p>📍 ${t.dist}</p>
        <div class="crops-tag">${t.crops.map(c => `<span>${c}</span>`).join('')}</div>
      </div>
      <a href="tel:${t.phone}" class="call-btn">📞<br>${t.phone}</a>
    </div>`).join('');

  if (cropName) {
    document.getElementById('tradersList').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

fetchPrices();
setInterval(fetchPrices, 300000);
setInterval(() => {
  const now = new Date();

}, 60000);
